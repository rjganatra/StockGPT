name: Deploy StockGPT Telegram WebApp

on:
  push:
    branches: [main]
    paths:
      - "webapp/**"
      - ".github/workflows/deploy_stockgpt_webapp.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: stockgpt-webapp-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: webapp

      - id: deployment
        uses: actions/deploy-pages@v4
