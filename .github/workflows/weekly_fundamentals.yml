name: Weekly Fundamentals

on:
  workflow_dispatch:

  schedule:
    - cron: "30 3 * * 0"

permissions:
  contents: write

jobs:
  fundamentals:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Fundamentals
        run: python app/fundamentals/fetch_fundamentals.py

      - name: Score Fundamentals
        run: python app/fundamentals/fundamental_score.py

      - name: Enrich Sector Industry Map
        run: python app/universe/enrich_sectors.py

      - name: Run Final Score Engine
        run: python app/scoring/score_engine.py

      - name: Store Scan In Database
        run: python app/database/store_scan.py

      - name: Commit fundamentals update
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Update fundamentals and final scores" || echo "No changes"
          git push
