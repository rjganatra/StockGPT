name: Phase6 Pipeline

on:
  schedule:
    - cron: "30 4 * * 1-5"
    - cron: "10 10 * * 1-5"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Refresh Universe
        run: python app/universe/fetch_nifty500.py

      - name: Run Scanner
        run: python app/scanners/scan_52w.py

      - name: Enrich Latest Scan With Sector Industry
        run: python app/universe/enrich_sectors.py

      - name: Calculate Relative Strength
        run: python app/scoring/relative_strength.py

      - name: Run Final Score Engine
        run: python app/scoring/score_engine.py

      - name: Run Range Bound Scanner
        run: python app/scanners/range_bound_scanner.py

      - name: Track Scan Changes
        run: python app/history/change_tracker.py

      - name: Save History
        run: python app/history/history_engine.py

      - name: Store Scan In Database
        run: python app/database/store_scan.py

      - name: Send Change Telegram Alerts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python app/alerts/change_alerts.py

      - name: Send Telegram Alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python app/alerts/telegram_alerts.py

      - name: Send Watchlist Telegram Alerts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python app/alerts/watchlist_alerts.py

      - name: Commit Results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Phase6 market pipeline update" || echo "No changes"
          git push

      - name: Telegram Failure Alert
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          import os
          import requests
          from datetime import datetime
          from zoneinfo import ZoneInfo

          token = os.getenv("TELEGRAM_BOT_TOKEN", "")
          chat_id = os.getenv("TELEGRAM_CHAT_ID", "")

          if not token or not chat_id:
              print("Telegram secrets missing. Skipping failure alert.")
              raise SystemExit(0)

          now = datetime.now(
              ZoneInfo("Asia/Kolkata")
          ).strftime("%d.%m.%Y at %I:%M %p IST")

          message = f"""❌ StockGPT workflow failed

          Workflow: Phase6 Pipeline
          Time: {now}

          Check GitHub Actions logs."""

          url = f"https://api.telegram.org/bot{token}/sendMessage"

          response = requests.post(
              url,
              json={
                  "chat_id": chat_id,
                  "text": message
              },
              timeout=20
          )

          print(response.status_code)
          print(response.text)
          PY
