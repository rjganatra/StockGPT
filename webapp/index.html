<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StockGPT</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --card: #111827;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: #334155;
      --accent: #22c55e;
      --accent2: #38bdf8;
      --chip: #020617;
      --warn: #f97316;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56,189,248,0.22), transparent 34%),
        radial-gradient(circle at bottom right, rgba(34,197,94,0.18), transparent 28%),
        linear-gradient(145deg, #020617, #0f172a);
      color: var(--text);
      padding: 18px;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
    }

    .hero {
      margin-bottom: 16px;
    }

    h1 {
      font-size: 30px;
      line-height: 1.05;
      margin: 0 0 8px;
      letter-spacing: -0.03em;
    }

    p {
      color: var(--muted);
      margin: 0;
      line-height: 1.45;
    }

    .card {
      background: rgba(15, 23, 42, 0.94);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin: 14px 0 7px;
    }

    select, input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 15px;
      padding: 14px 14px;
      background: #020617;
      color: var(--text);
      font-size: 16px;
      outline: none;
    }

    select {
      appearance: auto;
      -webkit-appearance: menulist;
    }

    select:focus, input:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .hidden {
      display: none !important;
    }

    .chips-title {
      font-size: 12px;
      color: var(--muted);
      margin-top: 14px;
      margin-bottom: 8px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .chip {
      border: 1px solid var(--border);
      background: var(--chip);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 13px;
      cursor: pointer;
    }

    .chip.primary {
      border-color: rgba(56, 189, 248, 0.7);
    }

    .chip.green {
      border-color: rgba(34, 197, 94, 0.7);
    }

    .chip.orange {
      border-color: rgba(249, 115, 22, 0.75);
    }

    .submit {
      width: 100%;
      border: 0;
      border-radius: 17px;
      padding: 15px;
      margin-top: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #020617;
      font-size: 17px;
      font-weight: 850;
      cursor: pointer;
    }

    .hint {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .error {
      color: #fca5a5;
      margin-top: 10px;
      font-size: 14px;
      min-height: 20px;
    }

    .footer {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    .small-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .pillbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .pill {
      border: 1px solid var(--border);
      background: rgba(2, 6, 23, 0.65);
      color: var(--text);
      border-radius: 14px;
      padding: 10px;
      font-size: 13px;
      text-align: center;
      cursor: pointer;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --border: #cbd5e1;
        --chip: #ffffff;
      }

      body {
        background: linear-gradient(145deg, #f8fafc, #e0f2fe);
      }

      .card, select, input, .pill {
        background: white;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>🧠 StockGPT</h1>
      <p>One form. One submit. One bot run.</p>
    </div>

    <div class="card">
      <label for="action">What do you want?</label>
      <select id="action">
        <option value="stock_analysis">🔍 Stock Analysis</option>
        <option value="stock_range">📦 Stock Range</option>
        <option value="stock_performance">📊 Stock / Signal Performance</option>
        <option value="compare">⚖️ Compare Stocks</option>
        <option value="sector">🏭 Sector View</option>
        <option value="top">📊 Top Ideas</option>
        <option value="range_list">📦 Range Bound List</option>
        <option value="swing">⚡ Swing Candidates</option>
        <option value="low">📉 52W Low</option>
        <option value="high">🚀 Momentum</option>
        <option value="risk">⚠️ Risky / Avoid</option>
        <option value="watchlist">⭐ Watchlist</option>
        <option value="performance">📈 Overall Performance</option>
      </select>

      <div class="pillbar">
        <button class="pill" data-action="stock_analysis">Analyse</button>
        <button class="pill" data-action="stock_range">Range</button>
        <button class="pill" data-action="compare">Compare</button>
        <button class="pill" data-action="sector">Sector</button>
      </div>

      <div id="singleBox">
        <label id="singleLabel" for="singleInput">Stock / Query</label>
        <input id="singleInput" list="symbolList" autocomplete="off" placeholder="Example: RECLTD" />
        <datalist id="symbolList"></datalist>

        <div class="chips-title" id="chipsTitle">Suggestions</div>
        <div class="chips" id="contextChips"></div>

        <div class="small-note" id="smallNote"></div>
      </div>

      <div id="sectorBox" class="hidden">
        <label for="sectorSelect">Choose sector / industry</label>
        <select id="sectorSelect"></select>

        <div id="customSectorBox" class="hidden">
          <label for="customSectorInput">Custom sector / industry</label>
          <input id="customSectorInput" autocomplete="off" placeholder="Example: Defence, Jewellery, Packaging" />
        </div>

        <div class="chips-title">Sector suggestions</div>
        <div class="chips" id="sectorChips"></div>
        <div class="small-note">This is a real mobile dropdown, not a stock suggestion dropdown.</div>
      </div>

      <div id="compareBox" class="hidden">
        <div class="grid">
          <div>
            <label for="symbolA">Stock 1</label>
            <input id="symbolA" list="symbolList" autocomplete="off" placeholder="RECLTD" />
          </div>
          <div>
            <label for="symbolB">Stock 2</label>
            <input id="symbolB" list="symbolList" autocomplete="off" placeholder="PFC" />
          </div>
        </div>

        <div class="chips-title">Popular comparisons</div>
        <div class="chips" id="compareChips"></div>
      </div>

      <div class="error" id="error"></div>

      <button class="submit" id="submitBtn">Submit to StockGPT</button>

      <div class="hint" id="hint">
        After submitting, run your StockGPT Bot shortcut once.
      </div>
    </div>

    <div class="footer">Research tool only. Not financial advice.</div>
  </div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  const REPO_RAW_SCAN = "https://raw.githubusercontent.com/rjganatra/StockGPT/main/data/scans/latest_scan.csv";
  const FAVORITES_URL = "favorites.json";

  let favoriteSymbols = ["RECLTD", "PFC", "RELIANCE", "TCS", "HDFCBANK", "ICICIBANK", "INFY", "SBIN", "AXISBANK", "ITC"];
  let favoritePairs = [["RECLTD", "PFC"], ["HDFCBANK", "ICICIBANK"], ["RELIANCE", "TCS"], ["INFY", "TCS"]];
  let sectorSuggestions = ["Bank", "Finance", "Power", "IT", "Auto", "FMCG", "Pharma", "Metal", "Energy", "Capital Goods", "Infrastructure", "Realty", "Telecom", "Cement", "Chemical", "Consumer", "Healthcare", "Oil & Gas"];
  let performanceSuggestions = ["range", "swing", "risk", "avoid", "top", "conviction", "low", "52w low", "fundamental", "relative", "sector adjusted", "overall"];
  let stockSymbols = [...favoriteSymbols];

  const actionEl = document.getElementById("action");
  const singleBox = document.getElementById("singleBox");
  const sectorBox = document.getElementById("sectorBox");
  const sectorSelect = document.getElementById("sectorSelect");
  const customSectorBox = document.getElementById("customSectorBox");
  const customSectorInput = document.getElementById("customSectorInput");
  const sectorChips = document.getElementById("sectorChips");
  const compareBox = document.getElementById("compareBox");
  const singleInput = document.getElementById("singleInput");
  const singleLabel = document.getElementById("singleLabel");
  const symbolA = document.getElementById("symbolA");
  const symbolB = document.getElementById("symbolB");
  const errorEl = document.getElementById("error");
  const contextChips = document.getElementById("contextChips");
  const compareChips = document.getElementById("compareChips");
  const chipsTitle = document.getElementById("chipsTitle");
  const smallNote = document.getElementById("smallNote");
  const symbolList = document.getElementById("symbolList");

  const params = new URLSearchParams(window.location.search);
  const initialAction = params.get("action");

  if (initialAction) {
    const allowed = Array.from(actionEl.options).map(o => o.value);
    if (allowed.includes(initialAction)) {
      actionEl.value = initialAction;
    }
  }

  function needsNoInput(action) {
    return ["top", "range_list", "swing", "low", "high", "risk", "watchlist", "performance"].includes(action);
  }

  function clearChips(container) {
    container.innerHTML = "";
  }

  function addChip(container, label, onClick, tone="primary") {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "chip " + tone;
    btn.textContent = label;
    btn.addEventListener("click", onClick);
    container.appendChild(btn);
  }

  function parseCSVLine(line) {
    const out = [];
    let cur = "";
    let quote = false;

    for (let i = 0; i < line.length; i++) {
      const c = line[i];

      if (c === '"') {
        quote = !quote;
      } else if (c === "," && !quote) {
        out.push(cur);
        cur = "";
      } else {
        cur += c;
      }
    }

    out.push(cur);
    return out.map(x => x.replace(/^"|"$/g, "").trim());
  }

  function uniqueSorted(values) {
    const clean = [];
    values.forEach(v => {
      const text = String(v || "").trim();
      if (text && text.toLowerCase() !== "unknown" && !clean.includes(text)) {
        clean.push(text);
      }
    });
    return clean.sort((a, b) => a.localeCompare(b));
  }

  function refreshDatalist() {
    symbolList.innerHTML = "";
    stockSymbols.slice(0, 1000).forEach(symbol => {
      const option = document.createElement("option");
      option.value = symbol;
      symbolList.appendChild(option);
    });
  }

  function refreshSectorDropdown() {
    sectorSelect.innerHTML = "";

    const placeholder = document.createElement("option");
    placeholder.value = "";
    placeholder.textContent = "Select sector / industry";
    sectorSelect.appendChild(placeholder);

    uniqueSorted(sectorSuggestions).forEach(sector => {
      const option = document.createElement("option");
      option.value = sector;
      option.textContent = sector;
      sectorSelect.appendChild(option);
    });

    const custom = document.createElement("option");
    custom.value = "__custom__";
    custom.textContent = "Other / Custom";
    sectorSelect.appendChild(custom);
  }

  function refreshSectorChips() {
    clearChips(sectorChips);

    uniqueSorted(sectorSuggestions).slice(0, 18).forEach(sector => {
      addChip(sectorChips, sector, () => {
        sectorSelect.value = sector;
        customSectorBox.classList.add("hidden");
        customSectorInput.value = "";
      }, "orange");
    });
  }

  function bestStockChips() {
    const merged = [...favoriteSymbols];

    for (const symbol of stockSymbols) {
      if (!merged.includes(symbol)) merged.push(symbol);
      if (merged.length >= 12) break;
    }

    return merged.slice(0, 12);
  }

  function refreshCompareChips() {
    clearChips(compareChips);

    favoritePairs.forEach(([a, b]) => {
      addChip(compareChips, `${a} vs ${b}`, () => {
        symbolA.value = a;
        symbolB.value = b;
      }, "primary");
    });
  }

  function refreshContextChips(action) {
    clearChips(contextChips);
    smallNote.textContent = "";

    if (action === "stock_analysis" || action === "stock_range") {
      chipsTitle.textContent = "Favorite stocks";
      bestStockChips().forEach(symbol => {
        addChip(contextChips, symbol, () => {
          singleInput.value = symbol;
          singleInput.focus();
        }, "primary");
      });

      smallNote.textContent = "Only stock suggestions are shown here.";
      return;
    }

    if (action === "stock_performance") {
      chipsTitle.textContent = "Performance shortcuts";
      performanceSuggestions.forEach(item => {
        addChip(contextChips, item, () => {
          singleInput.value = item;
          singleInput.focus();
        }, "green");
      });

      bestStockChips().slice(0, 8).forEach(symbol => {
        addChip(contextChips, symbol, () => {
          singleInput.value = symbol;
          singleInput.focus();
        }, "primary");
      });

      smallNote.textContent = "Use a performance shortcut, or type/select a stock from the dropdown.";
      return;
    }

    chipsTitle.textContent = "Suggestions";
  }

  function refreshForm() {
    const action = actionEl.value;
    errorEl.textContent = "";

    singleBox.classList.toggle("hidden", action === "compare" || action === "sector" || needsNoInput(action));
    sectorBox.classList.toggle("hidden", action !== "sector");
    compareBox.classList.toggle("hidden", action !== "compare");

    if (action === "stock_analysis") {
      singleLabel.textContent = "Which stock?";
      singleInput.placeholder = "Example: RECLTD";
      singleInput.setAttribute("list", "symbolList");
    } else if (action === "stock_range") {
      singleLabel.textContent = "Which stock for range analysis?";
      singleInput.placeholder = "Example: RECLTD";
      singleInput.setAttribute("list", "symbolList");
    } else if (action === "stock_performance") {
      singleLabel.textContent = "Stock or signal";
      singleInput.placeholder = "Example: RECLTD, range, swing, risk, top";
      singleInput.setAttribute("list", "symbolList");
    } else {
      singleInput.removeAttribute("list");
    }

    refreshContextChips(action);
    refreshCompareChips();
    refreshSectorDropdown();
    refreshSectorChips();
  }

  sectorSelect.addEventListener("change", () => {
    if (sectorSelect.value === "__custom__") {
      customSectorBox.classList.remove("hidden");
      customSectorInput.focus();
    } else {
      customSectorBox.classList.add("hidden");
      customSectorInput.value = "";
    }
  });

  document.querySelectorAll("[data-action]").forEach(btn => {
    btn.addEventListener("click", () => {
      actionEl.value = btn.dataset.action;
      refreshForm();

      if (btn.dataset.action === "sector") {
        sectorSelect.focus();
      } else {
        singleInput.focus();
      }
    });
  });

  actionEl.addEventListener("change", refreshForm);

  async function loadFavorites() {
    try {
      const response = await fetch(FAVORITES_URL, { cache: "no-store" });
      if (!response.ok) throw new Error("favorites not available");

      const data = await response.json();

      if (Array.isArray(data.favorite_symbols) && data.favorite_symbols.length) {
        favoriteSymbols = data.favorite_symbols.map(x => String(x).toUpperCase().trim()).filter(Boolean);
      }

      if (Array.isArray(data.favorite_pairs) && data.favorite_pairs.length) {
        favoritePairs = data.favorite_pairs;
      }

      if (Array.isArray(data.favorite_sectors) && data.favorite_sectors.length) {
        sectorSuggestions = data.favorite_sectors;
      }

      if (Array.isArray(data.performance_shortcuts) && data.performance_shortcuts.length) {
        performanceSuggestions = data.performance_shortcuts;
      }
    } catch (e) {
      // fallback already present
    }
  }

  async function loadScanData() {
    try {
      const response = await fetch(REPO_RAW_SCAN, { cache: "no-store" });
      if (!response.ok) throw new Error("latest_scan fetch failed");

      const csv = await response.text();
      const lines = csv.split(/\r?\n/).filter(Boolean);

      if (lines.length < 2) throw new Error("latest_scan empty");

      const headers = parseCSVLine(lines[0]).map(h => h.trim().replace(/^"|"$/g, ""));
      const symbolIndex = headers.indexOf("symbol");
      const sectorIndex = headers.indexOf("sector");
      const industryIndex = headers.indexOf("industry");

      const symbols = [];
      const sectors = [...sectorSuggestions];

      for (let i = 1; i < lines.length; i++) {
        const parts = parseCSVLine(lines[i]);

        if (symbolIndex >= 0) {
          const symbol = String(parts[symbolIndex] || "").trim().toUpperCase();
          if (symbol && !symbols.includes(symbol)) symbols.push(symbol);
        }

        if (sectorIndex >= 0) {
          const sector = String(parts[sectorIndex] || "").trim();
          if (sector && sector.toLowerCase() !== "unknown" && !sectors.includes(sector)) sectors.push(sector);
        }

        if (industryIndex >= 0) {
          const industry = String(parts[industryIndex] || "").trim();
          if (industry && industry.toLowerCase() !== "unknown" && !sectors.includes(industry)) sectors.push(industry);
        }
      }

      if (symbols.length > 50) {
        stockSymbols = symbols.sort();
      }

      if (sectors.length > sectorSuggestions.length) {
        sectorSuggestions = uniqueSorted(sectors);
      }
    } catch (e) {
      stockSymbols = [...favoriteSymbols];
    }
  }

  function buildPayload() {
    const action = actionEl.value;

    if (action === "compare") {
      const a = symbolA.value.trim();
      const b = symbolB.value.trim();

      if (!a || !b) {
        throw new Error("Enter both stocks to compare.");
      }

      return {
        source: "telegram_webapp",
        action,
        symbol_a: a,
        symbol_b: b
      };
    }

    if (needsNoInput(action)) {
      return {
        source: "telegram_webapp",
        action
      };
    }

    if (action === "sector") {
      let sectorValue = sectorSelect.value;

      if (sectorValue === "__custom__") {
        sectorValue = customSectorInput.value.trim();
      }

      if (!sectorValue) {
        throw new Error("Select or enter a sector / industry.");
      }

      return {
        source: "telegram_webapp",
        action,
        query: sectorValue
      };
    }

    const value = singleInput.value.trim();

    if (!value) {
      throw new Error("Enter required value.");
    }

    if (["stock_analysis", "stock_range"].includes(action)) {
      return {
        source: "telegram_webapp",
        action,
        symbol: value
      };
    }

    return {
      source: "telegram_webapp",
      action,
      query: value,
      symbol: value
    };
  }

  document.getElementById("submitBtn").addEventListener("click", () => {
    try {
      const payload = buildPayload();
      const data = JSON.stringify(payload);

      if (tg && tg.sendData) {
        tg.sendData(data);
        tg.close();
      } else {
        navigator.clipboard?.writeText(data);
        errorEl.textContent = "Telegram WebApp not detected. JSON copied for debugging.";
      }
    } catch (e) {
      errorEl.textContent = e.message || String(e);
    }
  });

  async function boot() {
    await loadFavorites();
    await loadScanData();
    refreshDatalist();
    refreshSectorDropdown();
    refreshSectorChips();
    refreshForm();
  }

  boot();
</script>
</body>
</html>
